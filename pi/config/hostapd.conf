# Tribe Pi AP — copy to /etc/hostapd/hostapd.conf (install.sh does this)
interface=wlan0
driver=nl80211
ssid=TribeHub-Pi
hw_mode=g
channel=6
ieee80211n=1
wmm_enabled=0
macaddr_acl=0
auth_algs=1
ignore_broadcast_ssid=0
# Open AP (ESP nodes + guests) — set wpa_* for WPA2:
# wpa=2
# wpa_passphrase=your-secret
# wpa_key_mgmt=WPA-PSK
