name: Pi Hub CI

on:
  push:
    branches: [main]
    paths:
      - 'pi/**'
  pull_request:
    branches: [main]
    paths:
      - 'pi/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pi

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 tribe_node/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 tribe_node/ --count --max-complexity=10 --max-line-length=127 --statistics
