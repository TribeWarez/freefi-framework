; Three boards — one env each (see include/config.h):
;   Board 1: ESP8266 + 0.96" OLED        -> esp8266_az
;   Board 2: Ideaspark ESP32-WROOM       -> esp32dev
;   ZY-ESP32 (ESP32-S3)                -> zy_esp32
;   Board 3: ESP8266MOD D1 + 3.5" shield -> NOT esp32_uno_* (8266); needs ESP32 Uno R32 for TFT envs
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
; BLE + web UI need >1.3 MB app slot
board_build.partitions = huge_app.csv
build_src_filter = +<main.cpp>
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
; Arduino-ESP32 3.x: AP NAPT for WiFi repeater (needs matching libs package)
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.4
    framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.0.4/esp32-arduino-libs-3.0.4.zip
monitor_speed = 115200

lib_deps =
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.0

build_flags =
    -DOLED_SDA=21
    -DOLED_SCL=22
    -DCREDENTIAL_PEPPER=\"tw-change-me\"
    ; Optional build-time uplink (prefer serial: uplink ssid pass)
    ; -DUPLINK_SSID=\"MyHomeWiFi\"
    ; -DUPLINK_PASS=\"MyHomePassword\"

; ZY-ESP32 (ESP32-WROOM-32, WiFi + BLE) — CP2102 USB; NOT ESP32-S3
; Set upload_port to your CP2102 port (often ttyUSB1), not the CH340 ESP8266 ports
[env:zy_esp32]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = huge_app.csv
build_src_filter = +<main.cpp>
upload_port = /dev/ttyUSB0
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.4
    framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.0.4/esp32-arduino-libs-3.0.4.zip
monitor_speed = 115200
monitor_port = /dev/ttyUSB0
lib_deps =
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.0
build_flags =
    -DCREDENTIAL_PEPPER=\"tw-change-me\"
    -DZY_ESP32_BOARD=1
    -DESP32_OLED_AUTODETECT=1
    -DOLED_SDA=21
    -DOLED_SCL=22
    -DOLED_SDA_ALT=8
    -DOLED_SCL_ALT=9
    -DOLED_SDA_ALT2=17
    -DOLED_SCL_ALT2=18

[env:heltec_wifi_kit_32]
platform = espressif32
board = heltec_wifi_kit_32
framework = arduino
board_build.partitions = huge_app.csv
build_src_filter = +<main.cpp>
monitor_speed = 115200
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.4
    framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.0.4/esp32-arduino-libs-3.0.4.zip
lib_deps =
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.0
build_flags =
    -DOLED_SDA=4
    -DOLED_SCL=15
    -DOLED_RST=16

; ESP8266MOD D1 Uno: silkscreen D14/D15 = GPIO4/5 (not GPIO14/15). Alt D4/D3 = GPIO2/0
[env:esp8266_az]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
build_src_filter = +<main.cpp>
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0

lib_deps =
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.0

build_flags =
    -DESP8266_OLED_AUTODETECT=1
    -DOLED_SDA=14
    -DOLED_SCL=15
    -DOLED_SDA_ALT=2
    -DOLED_SCL_ALT=0
    -DOLED_SDA_ALT2=4
    -DOLED_SCL_ALT2=5
    -DLWIP_IPV4_NAPT=1
    -DLWIP_IP_FORWARD=1
    -DCREDENTIAL_PEPPER=\"tw-change-me\"

; 3.5" Mcufriend Uno parallel shield on ESP32-WROOM Uno (WeMos D1 R32 / TTGO).
; NOT for ESP8266MOD D1 — 8266 cannot drive 8-bit parallel shields.
; Step 1: ID via MCUFRIEND (Serial 115200). Step 2: TFT_eSPI after editing tft_e_spi_uno_setup.h.
[env:esp32_uno_lcd_id]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    https://github.com/prenticedavid/MCUFRIEND_kbv.git
    adafruit/Adafruit GFX Library@^1.11.9
build_src_filter = +<lcd_read_id.cpp>

[env:esp32_uno_tft_id]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
build_flags =
    -DUSER_SETUP_LOADED=1
    -include include/tft_e_spi_uno_setup.h
build_src_filter = +<tft_read_id.cpp>
 